services:
  db:
    image: postgres:15-alpine
    container_name: dashboard-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-copilotkit}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  bifrost:
    image: maximhq/bifrost
    container_name: dashboard-bifrost
    ports:
      - "8080:8080"
    volumes:
      - ./bifrost-data:/app/data
    restart: always

  backend:
    image: ghcr.io/magggiiii/copilot-dashboard-backend:latest
    container_name: dashboard-backend
    ports:
      - "3500:3500"
    env_file:
      - .env
    environment:
      DB_HOST: db
      BIFROST_BASE_URL: http://bifrost:8080/v1
    depends_on:
      db:
        condition: service_healthy
      bifrost:
        condition: service_started
    restart: always

  frontend:
    image: ghcr.io/magggiiii/copilot-dashboard-frontend:latest
    container_name: dashboard-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
