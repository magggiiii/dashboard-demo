services:
  db:
    image: postgres:15-alpine
    container_name: dashboard-db-dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-copilotkit}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  bifrost:
    image: maximhq/bifrost
    container_name: dashboard-bifrost-dev
    ports:
      - "8080:8080"
    volumes:
      - ./bifrost-data:/app/data

  backend:
    build:
      context: ./gui-dashboard-backend-feature-langfuse
    container_name: dashboard-backend-dev
    ports:
      - "3500:3500"
    env_file:
      - .env
    environment:
      DB_HOST: db
      BIFROST_BASE_URL: http://bifrost:8080/v1
    depends_on:
      db:
        condition: service_healthy
      bifrost:
        condition: service_started

  frontend:
    build:
      context: ./gui-dashboard-frontend-main
    container_name: dashboard-frontend-dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data_dev:
