name: CI Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui-dashboard-frontend-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui-dashboard-frontend-main/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  backend:
    name: Backend Lint + Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui-dashboard-backend-feature-langfuse
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui-dashboard-backend-feature-langfuse/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint:check
      - name: Test
        run: npm run test -- --runInBand
      - name: Build
        run: npm run build
