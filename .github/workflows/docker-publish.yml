name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./gui-dashboard-backend-feature-langfuse
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/copilot-dashboard-backend:latest
            ghcr.io/${{ github.repository_owner }}/copilot-dashboard-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./gui-dashboard-frontend-main
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/copilot-dashboard-frontend:latest
            ghcr.io/${{ github.repository_owner }}/copilot-dashboard-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
